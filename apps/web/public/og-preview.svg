<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Multipass - Portable Agent Identity</title>
  <desc id="desc">Identity, proof, custody, Cred, and discovery context for agents and AI-native systems.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf1" />
      <stop offset="1" stop-color="#eadfcb" />
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18202f" />
      <stop offset="1" stop-color="#35566f" />
    </linearGradient>
    <linearGradient id="aura" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6eecd8" />
      <stop offset="0.52" stop-color="#b490ff" />
      <stop offset="1" stop-color="#f5a0d0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#18202f" flood-opacity="0.18" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#paper)" />
  <circle cx="990" cy="115" r="220" fill="#6eecd8" opacity="0.16" />
  <circle cx="1060" cy="520" r="260" fill="#b490ff" opacity="0.14" />
  <circle cx="105" cy="525" r="230" fill="#f5a0d0" opacity="0.12" />
  <rect x="72" y="70" width="1056" height="490" rx="34" fill="rgba(255,255,255,0.54)" stroke="#18202f" stroke-width="3" filter="url(#shadow)" />
  <g transform="translate(824 134)">
    <rect x="0" y="0" width="218" height="318" rx="30" fill="#fffaf1" stroke="#18202f" stroke-width="3" />
    <circle cx="109" cy="96" r="62" fill="url(#aura)" opacity="0.92" />
    <rect x="42" y="192" width="134" height="16" rx="8" fill="#18202f" opacity="0.88" />
    <rect x="42" y="228" width="96" height="14" rx="7" fill="#35566f" opacity="0.7" />
    <rect x="42" y="262" width="118" height="14" rx="7" fill="#35566f" opacity="0.42" />
  </g>
  <text x="116" y="150" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" letter-spacing="6" fill="#35566f">MULTIPASS</text>
  <text x="116" y="258" font-family="Inter, Arial, sans-serif" font-size="70" font-weight="900" fill="url(#ink)">Portable Agent</text>
  <text x="116" y="338" font-family="Inter, Arial, sans-serif" font-size="70" font-weight="900" fill="url(#ink)">Identity</text>
  <text x="116" y="414" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600" fill="#35566f">Identity, proof, custody, Cred, and discovery context</text>
  <text x="116" y="456" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600" fill="#35566f">for agents and AI-native systems.</text>
  <g transform="translate(116 498)">
    <rect width="172" height="44" rx="22" fill="#18202f" />
    <text x="86" y="29" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900" letter-spacing="2" fill="#fffaf1">HELIXA.XYZ</text>
  </g>
</svg>
